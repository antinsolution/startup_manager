name: Build Startup Manager

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  build-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Python x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build x64
        run: |
          pyinstaller --noconfirm --onefile --windowed
          --name StartupManager_x64
          startup_manager_complete.py

      - name: Upload x64
        uses: actions/upload-artifact@v4
        with:
          name: StartupManager_x64
          path: dist/StartupManager_x64.exe

  build-x86:
    runs-on: windows-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Python x86
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x86"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build x86
        run: |
          pyinstaller --noconfirm --onefile --windowed
          --name StartupManager_x86
          startup_manager_complete.py

      - name: Upload x86
        uses: actions/upload-artifact@v4
        with:
          name: StartupManager_x86
          path: dist/StartupManager_x86.exe
